<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXProof - Creative Proofing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: 'var(--brand-50)',
                100: 'var(--brand-100)',
                500: 'var(--brand-500)',
                600: 'var(--brand-600)',
                700: 'var(--brand-700)',
                900: 'var(--brand-900)',
              },
              background: 'var(--bg-main)',
              surface: 'var(--bg-surface)',
              'text-primary': 'var(--text-primary)',
              'text-secondary': 'var(--text-secondary)',
              'border-color': 'var(--border-color)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-main: #F5F5F5;
        --bg-surface: #FFFFFF;
        --text-primary: #1F2937;
        --text-secondary: #6B7280;
        --border-color: #E5E7EB;
        --brand-50: #EEF2FF;
        --brand-100: #E0E7FF;
        --brand-500: #6366F1;
        --brand-600: #4F46E5;
        --brand-700: #4338CA;
        --brand-900: #312E81;
      }
      .dark {
        --bg-main: #0B0C10;
        --bg-surface: #1F2833;
        --text-primary: #C5C6C7;
        --text-secondary: #45A29E;
        --border-color: #1F2833;
        --brand-50: #E0FFFD;
        --brand-100: #B2FFF9;
        --brand-500: #66FCF1;
        --brand-600: #45A29E;
        --brand-700: #1F2833;
        --brand-900: #0B0C10;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-main);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-secondary);
        border-radius: 4px;
        opacity: 0.5;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--brand-600);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.572.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "idb": "https://esm.sh/idb@8.0.0",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@3.11.174",
    "pdfjs-dist/": "https://esm.sh/pdfjs-dist@3.11.174/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-text-primary font-sans antialiased overflow-hidden transition-colors duration-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
